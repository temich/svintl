native: English
hello: Hello
bye: Bye
example:
  hello: Hello
items:
  count:
    "0":
      one: item
      other: items
product:
  count:
    "0":
      one: product
      other: products
buttons:
  catalog: Browse catalog
test:
  - one: "{n} week"
    other: "{n} weeks"
formatName: |
  !js
  (name, age) => `Hello, ${name}! You are ${age} years old.`
ran: |-
  !js
  (name, gender) => {
    if (gender === "he") return `${name} ran away`;
    if (gender === "she") return `${name} ran away`;
    return `${name} ran away`;
  }
joined: >-
  !js

  (names, groupName) => { const list = new Intl.ListFormat("en", { style:
  "long", type: "conjunction" }).format(names); return names.length === 1 ?
  `${list} has joined the ${groupName}` : `${list} have joined the
  ${groupName}`; }
